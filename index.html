<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testable Todo Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <article class="todo-card" data-testid="test-todo-card">
      <header class="todo-header">
        <h2 class="todo-title" data-testid="test-todo-title">
          Finalize Q1 Architecture
        </h2>
        <span
          class="badge priority-high"
          data-testid="test-todo-priority"
          aria-label="Priority: High"
          >High</span
        >
      </header>

      <p class="todo-description" data-testid="test-todo-description">
        Complete the system diagram and get sign-off from the lead engineer
        before the weekend sprint.
      </p>

      <div class="todo-meta">
        <div>
          Due: <time id="dueDate" data-testid="test-todo-due-date"></time>
        </div>
        <time
          id="timeRemaining"
          class="time-hint"
          data-testid="test-todo-time-remaining"
          aria-live="polite"
        ></time>
      </div>

      <ul class="tags-list" data-testid="test-todo-tags" role="list">
        <li class="tag" data-testid="test-todo-tag-work">Work</li>
        <li class="tag" data-testid="test-todo-tag-urgent">Urgent</li>
        <li class="tag">Design</li>
      </ul>

      <footer class="todo-footer">
        <div class="status-group">
          <input
            type="checkbox"
            id="todo-complete"
            data-testid="test-todo-complete-toggle"
          />
          <label for="todo-complete">
            <span data-testid="test-todo-status">In Progress</span>
          </label>
        </div>

        <div class="action-buttons">
          <button data-testid="test-todo-edit-button" aria-label="Edit Task">
            ✏️
          </button>
          <button
            data-testid="test-todo-delete-button"
            aria-label="Delete Task"
            onclick="alert('Delete clicked')"
          >
            🗑️
          </button>
        </div>
      </footer>
    </article>

    <script src="./script.js"></script>
  </body>
</html>
