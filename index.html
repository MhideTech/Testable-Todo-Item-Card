<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testable Todo Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <article class="todo-card" data-testid="test-todo-card" id="todoCard">
      <div class="view-mode">
        <header class="todo-header">
          <div>
            <h2 class="todo-title" data-testid="test-todo-title">Task Title</h2>
            <span id="priorityDisplay" data-testid="test-todo-priority">
              <span
                class="priority-indicator"
                data-testid="test-todo-priority-indicator"
              ></span>
              <span class="priority-text">Medium</span>
            </span>
          </div>
          <div class="overdue-badge" data-testid="test-todo-overdue-indicator">
            ⚠️ Overdue
          </div>
        </header>

        <div
          id="descContainer"
          class="collapsible-content"
          data-testid="test-todo-collapsible-section"
        >
          <p class="todo-description" data-testid="test-todo-description">
            Description goes here...
          </p>
        </div>
        <button
          id="expandToggle"
          class="expand-btn"
          data-testid="test-todo-expand-toggle"
          aria-expanded="false"
          aria-controls="descContainer"
        >
          Show More
        </button>

        <div class="todo-meta">
          <div>
            Due:
            <time id="dueDateDisplay" data-testid="test-todo-due-date"></time>
          </div>
          <time
            id="timeRemaining"
            data-testid="test-todo-time-remaining"
            aria-live="polite"
            style="font-weight: 600"
          ></time>
        </div>

        <ul
          class="tags-list"
          data-testid="test-todo-tags"
          role="list"
          style="
            display: flex;
            gap: 5px;
            list-style: none;
            padding: 0;
            margin-bottom: 1rem;
          "
        >
          <li
            style="
              background: #eee;
              padding: 2px 8px;
              border-radius: 4px;
              font-size: 12px;
            "
            data-testid="test-todo-tag-work"
          >
            Work
          </li>
        </ul>

        <footer class="controls-row">
          <div class="status-control-wrapper">
            <input
              type="checkbox"
              id="mainCheckbox"
              data-testid="test-todo-complete-toggle"
            />
            <select
              id="statusSelect"
              data-testid="test-todo-status-control"
              aria-label="Change status"
            >
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Done">Done</option>
            </select>
            <span data-testid="test-todo-status" style="display: none"
              >Status Hidden</span
            >
          </div>
          <div class="action-buttons">
            <button
              class="btn"
              id="editBtn"
              data-testid="test-todo-edit-button"
              aria-label="Edit Task"
            >
              Edit
            </button>
            <button
              class="btn btn-danger"
              data-testid="test-todo-delete-button"
              onclick="alert('Deleted')"
            >
              Delete
            </button>
          </div>
        </footer>
      </div>

      <div class="edit-mode">
        <form
          id="editForm"
          class="edit-form-grid"
          data-testid="test-todo-edit-form"
        >
          <div class="form-group">
            <label for="editTitle">Title</label>
            <input
              type="text"
              id="editTitle"
              data-testid="test-todo-edit-title-input"
              required
            />
          </div>
          <div class="form-group">
            <label for="editDesc">Description</label>
            <textarea
              id="editDesc"
              rows="3"
              data-testid="test-todo-edit-description-input"
            ></textarea>
          </div>
          <div class="form-group">
            <label for="editPriority">Priority</label>
            <select
              id="editPriority"
              data-testid="test-todo-edit-priority-select"
            >
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editDate">Due Date</label>
            <input
              type="datetime-local"
              id="editDate"
              data-testid="test-todo-edit-due-date-input"
            />
          </div>
          <div class="button-group">
            <button
              type="button"
              class="btn"
              id="cancelBtn"
              data-testid="test-todo-cancel-button"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="btn btn-primary"
              data-testid="test-todo-save-button"
            >
              Save Changes
            </button>
          </div>
        </form>
      </div>
    </article>

    <script src="./script.js"></script>
  </body>
</html>
